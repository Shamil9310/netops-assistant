name: CD

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Run deploy script on VM
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" \
            "~/netops-assistant/scripts/deploy_vm.sh"

stages:
  - test
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHON314_BIN: "/opt/python-3.14/bin/python3.14"

backend_imports:
  stage: test
  tags:
    - netops
  script:
    - |
      cd backend
      "${PYTHON314_BIN}" -m venv .venv
      source .venv/bin/activate
      pip install --upgrade pip
      pip install -e .[dev]
      python -c "from app.main import app; from app.core.config import settings; from app.services.journal import create_activity_entry; print('backend imports OK'); print(app.title); print(settings.environment)"

frontend_build:
  stage: test
  tags:
    - netops
  script:
    - |
      cd frontend
      npm install
      NEXT_PUBLIC_API_BASE_URL=http://example.invalid INTERNAL_API_BASE_URL=http://127.0.0.1:8000 npm run build

deploy_vm:
  stage: deploy
  tags:
    - netops
  when: manual
  only:
    - main
  script:
    - /home/corp.tele2.ru/admin.isaev/netops-assistant/scripts/deploy_vm.sh

backend_ruff:
  stage: test
  tags:
    - netops
  script:
    - |
      cd "$CI_PROJECT_DIR"
      "${PYTHON314_BIN}" -m venv .venv
      source .venv/bin/activate
      pip install --upgrade pip
      cd backend
      pip install -e .[dev]
      cd ..
      python doctor.py ruff

backend_pytest:
  stage: test
  tags:
    - netops
  script:
    - |
      cd "$CI_PROJECT_DIR"
      "${PYTHON314_BIN}" -m venv .venv
      source .venv/bin/activate
      pip install --upgrade pip
      cd backend
      pip install -e .[dev]
      cd ..
      python doctor.py pytest
